<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>تحدي توقعات كأس العالم 2026 — Visit Oman</title>
<meta name="description" content="تحدي توقعات كأس العالم 2026 لفريق Visit Oman، المشغّل الوطني للسياحة">

<!-- خطوط: El Messiri للعناوين، Tajawal للنصوص -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<!-- أعلام SVG (flag-icons) لضمان التوافق مع ويندوز -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">

<!-- ============================================================ -->
<!-- القسم: التصميم والهوية البصرية (Design System / CSS)          -->
<!-- ============================================================ -->
<style>
  /* ---------- Design tokens ---------- */
  :root{
    --bg:#F4ECDA;
    --bg-soft:#EFE4CC;
    --card:#FFFFFF;
    --card-border:#E7DAB9;
    --text:#152433;
    --text-dim:rgba(21,36,51,.62);
    --text-faint:rgba(21,36,51,.4);
    --teal:#1FAFA6;
    --teal-deep:#157E78;
    --purple:#5C4F95;
    --purple-deep:#473C75;
    --navy:#152433;
    --silver:#C7CDD3;
    --amber:#C9821F;
    --danger:#BE4A42;
    --ribbon: linear-gradient(95deg,#1FAFA6 0%, #BFC4CC 32%, #5C4F95 62%, #1B2A3A 100%);
    --shadow-sm: 0 2px 10px rgba(21,36,51,.07);
    --shadow-md: 0 10px 28px rgba(21,36,51,.10);
    --shadow-lg: 0 18px 48px rgba(21,36,51,.16);
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:9px;
    --font-display:'El Messiri','Tajawal',sans-serif;
    --font-body:'Tajawal',sans-serif;
    --header-h:64px;
    color-scheme: light;
  }
  [data-theme="dark"]{
    --bg:#0D1820;
    --bg-soft:#101F29;
    --card:#13232E;
    --card-border:#22384730;
    --card-border:#26404F;
    --text:#F1ECDD;
    --text-dim:rgba(241,236,221,.66);
    --text-faint:rgba(241,236,221,.42);
    --teal:#37CEC2;
    --teal-deep:#1FAFA6;
    --purple:#9489D6;
    --purple-deep:#7A6EC2;
    --navy:#F1ECDD;
    --silver:#445763;
    --amber:#E0A23F;
    --danger:#E2685F;
    --shadow-sm: 0 2px 10px rgba(0,0,0,.28);
    --shadow-md: 0 10px 28px rgba(0,0,0,.34);
    --shadow-lg: 0 18px 48px rgba(0,0,0,.5);
    color-scheme: dark;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    line-height:1.6;
    transition:background .35s ease, color .35s ease;
    min-height:100vh;
    padding-bottom:48px;
  }
  body::before{
    content:"";
    position:fixed; inset:0 0 auto 0; height:5px;
    background:var(--ribbon);
    z-index:50;
  }
  h1,h2,h3,h4{font-family:var(--font-display); margin:0; font-weight:700; letter-spacing:.2px;}
  p{margin:0;}
  button{font-family:inherit;}
  img{max-width:100%; display:block;}
  a{color:inherit;}
  ::selection{background:var(--teal); color:#fff;}

  /* focus visibility */
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2.5px solid var(--purple);
    outline-offset:2px;
    border-radius:6px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }

  .wrap{max-width:980px; margin:0 auto; padding:0 16px;}

  /* ---------- Header ---------- */
  .site-header{
    position:sticky; top:0; z-index:40;
    background:var(--bg);
    border-bottom:1px solid var(--card-border);
    padding-top:5px;
  }
  .site-header-inner{
    display:flex; align-items:center; gap:12px;
    padding:10px 16px;
    max-width:980px; margin:0 auto;
  }
  .brand{display:flex; align-items:center; gap:10px; flex:1; min-width:0;}
  .brand img{height:34px; width:auto; flex-shrink:0;}
  .brand-text{min-width:0;}
  .brand-text .t1{font-family:var(--font-display); font-weight:700; font-size:15px; line-height:1.15;}
  .brand-text .t2{font-size:11px; color:var(--text-dim); letter-spacing:.4px;}
  .header-controls{display:flex; align-items:center; gap:6px;}
  .icon-btn{
    width:36px; height:36px; border-radius:50%;
    border:1px solid var(--card-border); background:var(--card);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text); font-size:15px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .icon-btn:hover{box-shadow:var(--shadow-sm); transform:translateY(-1px);}
  .lang-btn{width:auto; padding:0 12px; font-size:12px; font-weight:700;}

  /* ---------- Tabs ---------- */
  .tabbar{
    display:flex; gap:6px; overflow-x:auto; padding:10px 16px 0;
    max-width:980px; margin:0 auto; scrollbar-width:none;
  }
  .tabbar::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex-shrink:0; border:none; background:transparent; cursor:pointer;
    padding:9px 16px; border-radius:999px; font-weight:700; font-size:13.5px;
    color:var(--text-dim); display:flex; align-items:center; gap:6px;
    transition:background .2s, color .2s;
  }
  .tab-btn.active{background:var(--navy); color:var(--bg);}
  [data-theme="dark"] .tab-btn.active{background:var(--teal); color:#06201D;}
  .tab-btn:not(.active):hover{background:var(--card-border);}

  main{padding-top:18px;}
  .view{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Cards ---------- */
  .card{
    background:var(--card); border:1px solid var(--card-border);
    border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
    padding:18px; margin-bottom:14px;
  }
  .card-hd{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px;}
  .card-hd h3{font-size:16px;}
  .muted{color:var(--text-dim); font-size:13px;}
  .center{text-align:center;}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    border:none; cursor:pointer; font-weight:700; font-size:14px;
    padding:11px 20px; border-radius:999px; transition:transform .15s, box-shadow .15s, opacity .15s;
    font-family:var(--font-body);
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--ribbon); color:#fff; box-shadow:var(--shadow-sm);}
  .btn-primary:hover{box-shadow:var(--shadow-md);}
  .btn-primary:disabled{opacity:.4; cursor:not-allowed; box-shadow:none;}
  .btn-ghost{background:transparent; border:1.5px solid var(--card-border); color:var(--text);}
  .btn-ghost:hover{border-color:var(--purple);}
  .btn-soft{background:var(--bg-soft); color:var(--text);}
  .btn-danger{background:var(--danger); color:#fff;}
  .btn-sm{padding:7px 14px; font-size:12.5px;}
  .btn-block{width:100%;}

  /* ---------- Forms ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; font-weight:700; color:var(--text-dim); margin-bottom:6px;}
  .field input[type="text"], .field input[type="password"], .field select{
    width:100%; padding:12px 14px; border-radius:var(--radius-sm);
    border:1.5px solid var(--card-border); background:var(--bg);
    color:var(--text); font-family:inherit; font-size:14.5px;
  }
  .field input:focus{border-color:var(--teal);}
  .score-input{
    width:52px; height:52px; text-align:center; font-size:20px; font-weight:800;
    border-radius:var(--radius-sm); border:1.5px solid var(--card-border);
    background:var(--bg); color:var(--text); font-family:var(--font-body);
  }
  .score-input:focus{border-color:var(--teal);}
  .score-input:disabled{opacity:.5;}

  /* ---------- Badges ---------- */
  .badge{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px;
    white-space:nowrap;
  }
  .badge-open{background:#1FAFA61c; color:var(--teal-deep);}
  [data-theme="dark"] .badge-open{background:#37cec226; color:var(--teal);}
  .badge-soon{background:#C9821F1c; color:var(--amber);}
  [data-theme="dark"] .badge-soon{background:#e0a23f26; color:var(--amber);}
  .badge-closed{background:#BE4A421c; color:var(--danger);}
  [data-theme="dark"] .badge-closed{background:#e2685f26; color:var(--danger);}
  .badge-neutral{background:var(--bg-soft); color:var(--text-dim);}

  /* ---------- Match card (signature arch motif) ---------- */
  .match-card{
    position:relative;
    background:var(--card); border:1px solid var(--card-border);
    border-radius:40px 40px var(--radius-md) var(--radius-md);
    padding:20px 16px 16px; margin-bottom:12px;
    box-shadow:var(--shadow-sm);
    overflow:hidden;
  }
  .match-card::before{
    content:""; position:absolute; top:0; right:0; left:0; height:4px;
    background:var(--ribbon);
  }
  .match-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; font-size:11.5px; color:var(--text-faint);}
  .match-teams{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px;}
  .team-col{display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; min-width:0;}
  .team-col .fi{font-size:30px; border-radius:8px; box-shadow:0 0 0 1px rgba(0,0,0,.06);}
  .team-name{font-size:12.5px; font-weight:700; line-height:1.25; max-width:100%;}
  .team-name.tbd{color:var(--text-faint); font-weight:500; font-size:11.5px;}
  .score-mid{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .score-pair{display:flex; align-items:center; gap:6px;}
  .vs-label{font-size:11px; color:var(--text-faint); font-weight:700;}
  .pen-row{
    margin-top:12px; padding-top:12px; border-top:1px dashed var(--card-border);
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
  }
  .pen-row .pen-label{font-size:12px; color:var(--text-dim); font-weight:700;}
  .pen-choice{
    display:flex; gap:6px;
  }
  .pen-choice button{
    border:1.5px solid var(--card-border); background:var(--bg); color:var(--text-dim);
    border-radius:999px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer;
  }
  .pen-choice button.sel{background:var(--purple); border-color:var(--purple); color:#fff;}

  .crowd-bar-wrap{margin-top:13px;}
  .crowd-bar{display:flex; height:7px; border-radius:99px; overflow:hidden; background:var(--bg-soft);}
  .crowd-bar span{height:100%;}
  .crowd-labels{display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-faint); margin-top:5px;}

  /* ---------- Live total bar ---------- */
  .total-bar{
    position:sticky; top:var(--header-h); z-index:30;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--navy); color:var(--bg);
    border-radius:var(--radius-md); padding:12px 18px; margin:14px 0;
    box-shadow:var(--shadow-md);
  }
  [data-theme="dark"] .total-bar{background:var(--teal); color:#06201D;}
  .total-bar .lbl{font-size:11.5px; opacity:.75; font-weight:600;}
  .total-bar .val{font-family:var(--font-display); font-size:22px; font-weight:700;}

  /* ---------- Countdown ---------- */
  .countdown-card{
    text-align:center; padding:26px 18px;
    background: var(--ribbon);
    border-radius:var(--radius-lg); color:#fff; margin-bottom:16px; position:relative; overflow:hidden;
  }
  .countdown-card .cd-label{font-size:12.5px; opacity:.85; font-weight:700; margin-bottom:10px;}
  .countdown-grid{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .cd-unit{background:rgba(255,255,255,.16); backdrop-filter:blur(3px); border-radius:14px; padding:10px 14px; min-width:64px;}
  .cd-unit b{display:block; font-family:var(--font-display); font-size:24px;}
  .cd-unit span{font-size:10px; opacity:.85;}

  /* ---------- Round selector pills ---------- */
  .round-pills{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; scrollbar-width:none;}
  .round-pills::-webkit-scrollbar{display:none;}
  .round-pill{
    flex-shrink:0; padding:10px 16px; border-radius:999px; border:1.5px solid var(--card-border);
    background:var(--card); cursor:pointer; font-weight:700; font-size:13px; display:flex; align-items:center; gap:7px;
    color:var(--text-dim);
  }
  .round-pill.active{border-color:var(--purple); color:var(--text); box-shadow:var(--shadow-sm);}
  .round-pill .dot{width:7px; height:7px; border-radius:50%;}

  /* ---------- View toggle (list/bracket) ---------- */
  .view-toggle{display:flex; gap:4px; background:var(--bg-soft); padding:4px; border-radius:999px;}
  .view-toggle button{
    border:none; background:transparent; padding:7px 14px; border-radius:999px;
    font-size:12.5px; font-weight:700; cursor:pointer; color:var(--text-dim);
  }
  .view-toggle button.active{background:var(--card); color:var(--text); box-shadow:var(--shadow-sm);}

  /* ---------- Bracket ---------- */
  .bracket-scroll{overflow-x:auto; padding:6px 2px 18px;}
  .bracket{display:flex; gap:26px; min-width:max-content;}
  .bracket-col{display:flex; flex-direction:column; justify-content:space-around; gap:14px; min-width:190px;}
  .bracket-col-title{text-align:center; font-size:11.5px; font-weight:800; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px;}
  .b-match{
    background:var(--card); border:1px solid var(--card-border); border-radius:12px;
    padding:9px 10px; font-size:12px; box-shadow:var(--shadow-sm);
  }
  .b-team{display:flex; align-items:center; justify-content:space-between; gap:6px; padding:3px 0;}
  .b-team .nm{display:flex; align-items:center; gap:6px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:700;}
  .b-team.tbd .nm{color:var(--text-faint); font-weight:500;}
  .b-team .gl{font-weight:800; font-family:var(--font-display);}
  .b-div{height:1px; background:var(--card-border); margin:2px 0;}

  /* ---------- Empty / waiting states ---------- */
  .empty-state{text-align:center; padding:50px 20px;}
  .empty-state .icon{font-size:42px; margin-bottom:14px;}
  .empty-state h3{margin-bottom:8px; font-size:18px;}
  .empty-state p{color:var(--text-dim); font-size:13.5px; max-width:360px; margin:0 auto;}

  /* ---------- Register screen ---------- */
  .register-screen{max-width:420px; margin:40px auto;}
  .register-screen .logo-big{height:54px; margin:0 auto 18px;}
  datalist{}

  /* ---------- Leaderboard ---------- */
  .lb-subtabs{display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; scrollbar-width:none;}
  .lb-subtabs::-webkit-scrollbar{display:none;}
  .lb-subtabs button{
    flex-shrink:0; border:1.5px solid var(--card-border); background:var(--card); color:var(--text-dim);
    padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:700; cursor:pointer;
  }
  .lb-subtabs button.active{background:var(--purple); border-color:var(--purple); color:#fff;}

  .my-rank-card{
    display:flex; align-items:center; gap:14px; padding:16px 18px;
    background:var(--ribbon); border-radius:var(--radius-lg); color:#fff; margin-bottom:14px;
  }
  .my-rank-card .rk{font-family:var(--font-display); font-size:30px; font-weight:700; min-width:48px; text-align:center;}
  .my-rank-card .info{flex:1;}
  .my-rank-card .info .nm{font-weight:700; font-size:15px;}
  .my-rank-card .info .pt{font-size:12px; opacity:.85;}

  .lb-row{
    display:flex; align-items:center; gap:12px; padding:12px 14px;
    border-bottom:1px solid var(--card-border);
  }
  .lb-row:last-child{border-bottom:none;}
  .lb-row.me{background:var(--bg-soft); border-radius:var(--radius-sm);}
  .lb-rank{width:30px; text-align:center; font-weight:800; font-family:var(--font-display); font-size:15px; color:var(--text-dim); flex-shrink:0;}
  .lb-name{flex:1; font-weight:700; font-size:14px; display:flex; align-items:center; gap:6px; min-width:0;}
  .lb-points{font-weight:800; font-family:var(--font-display); font-size:16px; display:flex; align-items:center; gap:4px;}
  .pop-anim{display:inline-block; color:var(--teal-deep); font-size:11px; font-weight:800; animation:popUp 1.8s ease forwards;}
  [data-theme="dark"] .pop-anim{color:var(--teal);}
  @keyframes popUp{0%{opacity:0; transform:translateY(4px);} 15%{opacity:1; transform:translateY(0);} 80%{opacity:1;} 100%{opacity:0; transform:translateY(-10px);}}

  .share-btn-row{display:flex; justify-content:center; margin-top:16px;}

  /* ---------- Admin ---------- */
  .admin-lock{max-width:340px; margin:60px auto; text-align:center;}
  .group-admin-row{
    display:grid; grid-template-columns:auto 1fr repeat(4,52px); gap:8px; align-items:center;
    padding:7px 0; font-size:13px;
  }
  .group-admin-row input{
    width:100%; padding:7px 4px; text-align:center; border-radius:8px; border:1.3px solid var(--card-border);
    background:var(--bg); color:var(--text); font-family:inherit; font-size:13px;
  }
  .group-admin-head{font-size:10.5px; color:var(--text-faint); font-weight:700; text-align:center;}
  .progress-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .progress-table th,.progress-table td{padding:8px 6px; border-bottom:1px solid var(--card-border); text-align:center;}
  .progress-table th{color:var(--text-faint); font-weight:700; font-size:11px;}
  .progress-table td:first-child, .progress-table th:first-child{text-align:right;}
  .pill-mini{padding:2px 9px; border-radius:99px; font-size:10.5px; font-weight:800;}
  .admin-section-title{
    display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color:var(--text-dim);
    margin:22px 0 10px; text-transform:uppercase; letter-spacing:.4px;
  }
  .admin-section-title::after{content:""; flex:1; height:1px; background:var(--card-border);}
  .kickoff-row{display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .kickoff-row input[type="datetime-local"]{
    padding:8px 10px; border-radius:8px; border:1.3px solid var(--card-border); background:var(--bg); color:var(--text); font-family:inherit; font-size:12.5px;
  }
  .log-line{font-size:11.5px; color:var(--text-faint); padding:8px 0; border-top:1px dashed var(--card-border); margin-top:10px;}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:var(--bg); padding:12px 22px; border-radius:999px;
    font-size:13px; font-weight:700; box-shadow:var(--shadow-lg); z-index:100;
    animation:toastIn .25s ease;
  }
  [data-theme="dark"] .toast{background:var(--teal); color:#06201D;}
  @keyframes toastIn{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(13,24,32,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:90; padding:20px;
  }
  .modal-box{
    background:var(--card); border-radius:var(--radius-lg); padding:24px; max-width:380px; width:100%;
    box-shadow:var(--shadow-lg); max-height:88vh; overflow-y:auto;
  }

  footer{text-align:center; padding:30px 16px 10px; font-size:11.5px; color:var(--text-faint);}

  @media (max-width:520px){
    .team-name{font-size:11.5px;}
    .score-input{width:44px; height:44px; font-size:17px;}
    .group-admin-row{grid-template-columns:auto 1fr repeat(4,42px); font-size:11.5px;}
  }
</style>
</head>
<body>

<!-- هيكل الصفحة (App Shell)                                      -->

<header class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <img id="brandLogo" src="" alt="Visit Oman">
      <div class="brand-text">
        <div class="t1" data-t="appTitle">تحدي توقعات كأس العالم</div>
        <div class="t2" data-t="appSubtitle">Visit Oman — المشغّل الوطني للسياحة</div>
      </div>
    </div>
    <div class="header-controls">
      <button class="icon-btn lang-btn" id="langToggle" type="button" title="EN/AR">EN</button>
      <button class="icon-btn" id="themeToggle" type="button" title="تبديل المظهر">🌙</button>
    </div>
  </div>
  <nav class="tabbar" id="tabbar">
    <button class="tab-btn" data-tab="predict" data-t="tabPredict">توقعاتي</button>
    <button class="tab-btn" data-tab="leaderboard" data-t="tabLeaderboard">لوحة المتصدرين</button>

/* القسم 4: دوال خالصة لحساب المجموعات والتأهل والأقواس والنقاط   */
/* (Pure functions — تُحسب دائماً من predictions + results الحالية) */

// ترتيب فرق مجموعة واحدة: نقاط ثم فارق أهداف (نظام مبسّط حسب الحقول التي
// يُدخلها المسؤول: W/D/L/فارق أهداف فقط، دون أهداف مسجلة منفصلة)
function groupStandings(groupId){
  const g = state.results.groups[groupId];
  const teams = WC_GROUPS[groupId].map(tm=>tm.c);
  return teams.map(code=>{
    const r = (g && g.teams && g.teams[code]) || {w:0,d:0,l:0,gd:0};
    const pts = (r.w||0)*3 + (r.d||0)*1;
    const gd = r.gd||0;
    return { code, group:groupId, w:r.w||0, d:r.d||0, l:r.l||0, gd, pts };
  }).sort((a,b)=> b.pts-a.pts || b.gd-a.gd || a.code.localeCompare(b.code));
}
function isGroupComplete(groupId){
  const g = state.results.groups[groupId];
  return !!(g && g.completed);
}
function allGroupsComplete(){
  return WC_GROUP_IDS.every(isGroupComplete);
}

// المتأهلون: أبطال + وصفاء + أفضل 8 أصحاب مركز ثالث
function computeQualifiers(){
  if(!allGroupsComplete()) return null;
  const winners = {}, runnersUp = {}, thirds = [];
  WC_GROUP_IDS.forEach(g=>{
    const st = groupStandings(g);
    winners[g] = st[0].code;
    runnersUp[g] = st[1].code;
    thirds.push(st[2]);
  });
  thirds.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || a.code.localeCompare(b.code));
  const bestThirds = thirds.slice(0,8);
  return { winners, runnersUp, bestThirds };
}

// بناء مباريات دور الـ32 الـ16 من المتأهلين (راجع تعليق WC_GROUP_PAIRS أعلاه)
function buildR32Pairing(){
  const q = computeQualifiers();
  if(!q) return null;
  const slots = [];
  WC_GROUP_PAIRS.forEach(([x,y])=>{
    slots.push({ a:{code:q.winners[x], srcLabel:"بطل المجموعة "+x}, b:{code:q.runnersUp[y], srcLabel:"وصيف المجموعة "+y} });
    slots.push({ a:{code:q.winners[y], srcLabel:"بطل المجموعة "+y}, b:{code:q.runnersUp[x], srcLabel:"وصيف المجموعة "+x} });
  });
  // أفضل 8 أصحاب مركز ثالث: 1×8 ، 2×7 ، 3×6 ، 4×5
  const bt = q.bestThirds;
  [[0,7],[1,6],[2,5],[3,4]].forEach(([i,j])=>{
    slots.push({ a:{code:bt[i].code, srcLabel:"أفضل ثالث #"+(i+1)}, b:{code:bt[j].code, srcLabel:"أفضل ثالث #"+(j+1)} });
  });
  return slots; // 16 عنصر، كل عنصر {a:{code},b:{code}}
}

// يحدد فريقي أي خانة في أي دور (يُعيد {code|null, label})
function getSlotSide(round, slotIndex, side){
  if(round==='r32'){
    const pairing = buildR32Pairing();
    if(!pairing) return { code:null, label: state.lang==='en' ? 'Pending group stage results' : 'بانتظار نتائج المجموعات' };
    const slot = pairing[slotIndex];
    const s = slot[side];
    return { code:s.code, label: teamName(s.code) };
  }
  // الأدوار الأخرى: تُغذّى من نتائج المباراتين السابقتين (فهرس*2 و فهرس*2+1)
  const prev = prevStageId(round);
  const feedIdx = side==='a' ? slotIndex*2 : slotIndex*2+1;
  return resolveMatchWinner(prev, feedIdx);
}

// يحدد الفائز الفعلي لمباراة معيّنة بناءً على النتائج الرسمية المُدخلة، أو
// يعيد تسمية وصفية تراكمية ("الفائز من X × Y") إن لم تُحسم بعد
function resolveMatchWinner(round, slotIndex){
  if(!round) return { code:null, label:'—' };
  const a = getSlotSide(round, slotIndex, 'a');
  const b = getSlotSide(round, slotIndex, 'b');
  const res = (state.results.knockout[round] || [])[slotIndex];
  if(res && res.homeGoals!=null && res.awayGoals!=null){
    if(res.homeGoals > res.awayGoals) return a.code ? a : { code:null, label:a.label };
    if(res.awayGoals > res.homeGoals) return b.code ? b : { code:null, label:b.label };
    if(res.pen && res.pen.home!=null && res.pen.away!=null){
      return res.pen.home > res.pen.away ? a : b;
    }
  }
  // لم تُحسم بعد: تسمية وصفية
  const label = (a.code? a.label : a.label) + ' × ' + (b.code? b.label : b.label);
  return { code:null, label: label, pending:true, aLabel:a.label, bLabel:b.label };
}

function getMatchTeams(round, slotIndex){
  return { a: getSlotSide(round, slotIndex,'a'), b: getSlotSide(round, slotIndex,'b') };
}

// هل الجولة (الدور) مفتوحة إجمالاً؟ (يبقى كل دور إقصائي يُغلق تدريجياً مباراة بمباراة لاحقاً)
function isRoundOpen(round){
  const ov = (state.results.overrides||{})[round];
  if(ov==='closed') return false;
  if(ov==='open') return true;
  if(round==='r32') return allGroupsComplete();
  const prev = prevStageId(round);
  return isRoundFullyDecided(prev);
}
function isRoundFullyDecided(round){
  if(!round) return true;
  const def = stageDef(round);
  for(let i=0;i<def.matchCount;i++){
    if(!resolveMatchWinner(round,i).code) return false;
  }
  return true;
}
function matchKickoff(round, slotIndex){
  const res = (state.results.knockout[round]||[])[slotIndex];
  if(res && res.kickoff) return new Date(res.kickoff);
  return new Date(stageDef(round).closesAt);
}
function isMatchLocked(round, slotIndex){
  const ov = (state.results.overrides||{})[round];
  if(ov==='closed') return true;
  if(ov==='open') return false;
  return state.now >= matchKickoff(round, slotIndex);
}
function nextClosingMatch(){
  // أقرب مباراة مفتوحة وغير مقفلة بعد، عبر كل الأدوار بالترتيب — لعداد التنازلي
  for(const s of WC_STAGES){
    if(!isRoundOpen(s.id)) continue;
    for(let i=0;i<s.matchCount;i++){
      if(!isMatchLocked(s.id,i)) return { round:s.id, slotIndex:i, time:matchKickoff(s.id,i) };
    }
  }
  return null;
}

// نقاط مباراة واحدة (مسودة أو محفوظة) مقابل النتيجة الفعلية
function computeMatchPoints(pred, round, slotIndex){
  if(!pred || pred.homeGoals==null || pred.awayGoals==null) return 0;
  const res = (state.results.knockout[round]||[])[slotIndex];
  if(!res || res.homeGoals==null || res.awayGoals==null) return 0;
  let pts = 0;
  const predSide = pred.homeGoals===pred.awayGoals ? (pred.pen ? (pred.pen.home>pred.pen.away?'a':'b') : null)
                    : (pred.homeGoals>pred.awayGoals ? 'a':'b');
  const actSide = res.homeGoals===res.awayGoals ? (res.pen ? (res.pen.home>res.pen.away?'a':'b') : null)
                    : (res.homeGoals>res.awayGoals ? 'a':'b');
  if(predSide && actSide && predSide===actSide) pts += WC_SCORING.knockoutWinner;
  if(pred.homeGoals===res.homeGoals && pred.awayGoals===res.awayGoals) pts += WC_SCORING.knockoutExactBonus;
  return pts;
}

// إجمالي نقاط مشارك معيّن، اختيارياً لدور واحد فقط (لتبويبات لوحة المتصدرين)
function computeUserTotal(userPredictions, roundFilter){
  if(!userPredictions || !userPredictions.knockout) return 0;
  let total = 0;
  WC_STAGES.forEach(s=>{
    if(roundFilter && roundFilter!=='overall' && roundFilter!==s.id) return;
    const arr = userPredictions.knockout[s.id] || [];
    arr.forEach((pred, idx)=>{ total += computeMatchPoints(pred, s.id, idx); });
  });
  return total;
}

function leaderboardRows(roundFilter){
  const rows = state.predictions.map(p=>({
    id:p.id, name:p.name, points: computeUserTotal(p, roundFilter)
  }));
  rows.sort((a,b)=> b.points - a.points);
  // ترتيب نسبي Dense rank
  let rank = 0, lastPts = null;
  rows.forEach((r,i)=>{
    if(r.points !== lastPts){ rank++; lastPts = r.points; }
    r.rank = rank;
  });
  return rows;
}

// توقّع الجمهور لمباراة: نسب فوز أ / تعادل / فوز ب بين كل من حفظ توقعاً لها
function crowdStats(round, slotIndex){
  let a=0,d=0,b=0,total=0;
  state.predictions.forEach(p=>{
    const pred = p.knockout && p.knockout[round] && p.knockout[round][slotIndex];
    if(!pred || pred.homeGoals==null || pred.awayGoals==null) return;
    total++;
    if(pred.homeGoals>pred.awayGoals) a++;
    else if(pred.awayGoals>pred.homeGoals) b++;
    else d++;
  });
  if(total===0) return null;
  return { a: Math.round(a/total*100), d: Math.round(d/total*100), b: Math.round(b/total*100), total };
}

function participantProgress(p){
  // يُرجع لكل دور: عدد المباريات المكتملة من إجمالي عدد مباريات ذلك الدور المفتوحة فعلياً
  return WC_STAGES.map(s=>{
    const arr = (p.knockout && p.knockout[s.id]) || [];
    let filled = 0;
    for(let i=0;i<s.matchCount;i++){
      const pr = arr[i];
      if(pr && pr.homeGoals!=null && pr.awayGoals!=null) filled++;
    }
    return { round:s.id, filled, of: s.matchCount };
  });
}

  const card = document.getElementById('countdownCard');
  if(!card) return;
  const time = new Date(card.dataset.time);
  const diff = Math.max(0, time - state.now);
  const d = Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  const grid = document.getElementById('countdownGrid');
  if(grid){
    grid.innerHTML = [
      [d,t('days')],[h,t('hours')],[m,t('mins')],[s,t('secs')]
    ].map(([v,l])=>`<div class="cd-unit"><b>${String(v).padStart(2,'0')}</b><span>${esc(l)}</span></div>`).join('');
  }
}

// يدمج المسودة الحالية فوق آخر نسخة محفوظة لهذا المستخدم (لعرض حيّ دقيق)
function currentMergedPrediction(){
  const saved = state.predictions.find(p=>p.id===(state.user&&state.user.id));
  const base = saved ? JSON.parse(JSON.stringify(saved)) : { id:state.user?state.user.id:null, name:state.user?state.user.name:'', knockout:{r32:[],r16:[],qf:[],sf:[],final:[]} };
  WC_STAGE_IDS.forEach(rid=>{
    if(!base.knockout[rid]) base.knockout[rid] = [];
    Object.keys(state.draft[rid]||{}).forEach(idx=>{
      base.knockout[rid][idx] = state.draft[rid][idx];
    });
  });
  return base;
}

/* ---------- بطاقة مباراة واحدة (قابلة للتحرير في تبويب توقعاتي) ---------- */
function getDraftOrSaved(round, idx){
  if(state.draft[round] && state.draft[round][idx]!==undefined) return state.draft[round][idx];
  const saved = state.user && state.predictions.find(p=>p.id===state.user.id);
  if(saved && saved.knockout && saved.knockout[round] && saved.knockout[round][idx]) return saved.knockout[round][idx];
  return null;
}

function renderMatchCard(round, idx, editable){
  const teams = getMatchTeams(round, idx);
  const locked = isMatchLocked(round, idx) || !state.user;
  const pred = getDraftOrSaved(round, idx) || {};
  const res = (state.results.knockout[round]||[])[idx];
  const showCrowd = locked; // بعد إغلاق المباراة أو دخول نتيجة فعلية لها
  const cs = showCrowd ? crowdStats(round, idx) : null;
  const isTie = pred.homeGoals!=null && pred.awayGoals!=null && pred.homeGoals===pred.awayGoals;

  const teamBlock = (side, sideTeam)=>{
    if(sideTeam.code){
      return `<div class="team-col">
        <span class="${teamFlagClass(sideTeam.code)}"></span>
        <span class="team-name">${esc(sideTeam.label)}</span>
      </div>`;
    }
    return `<div class="team-col">
      <span style="font-size:26px;">🏳️</span>
      <span class="team-name tbd">${esc(t('waitingTeams'))}<br>${esc(sideTeam.label)}</span>
    </div>`;
  };

  let kickoffMeta = '';
  const ko = matchKickoff(round, idx);
  kickoffMeta = `<span>${fmtTime(ko, true)}</span>`;

  const penA = pred.pen && pred.pen.home>pred.pen.away;
  const penB = pred.pen && pred.pen.away>pred.pen.home;
  const penRow = `<div class="pen-row" data-pen-row data-round="${round}" data-idx="${idx}" style="${isTie?'':'display:none;'}">
      <span class="pen-label">${esc(t('penShootout'))}</span>
      <div class="pen-choice">
        <button data-action="setPenWinner" data-round="${round}" data-idx="${idx}" data-side="a" class="${penA?'sel':''}" ${locked?'disabled':''}>${teams.a.code?esc(teamName(teams.a.code)):'A'}</button>
        <button data-action="setPenWinner" data-round="${round}" data-idx="${idx}" data-side="b" class="${penB?'sel':''}" ${locked?'disabled':''}>${teams.b.code?esc(teamName(teams.b.code)):'B'}</button>
      </div>
    </div>`;

  let crowdHtml = '';
  if(cs){
    crowdHtml = `<div class="crowd-bar-wrap">
      <div class="muted" style="font-size:11px;margin-bottom:5px;">${esc(t('crowdSays'))} (${cs.total})</div>
      <div class="crowd-bar">
        <span style="width:${cs.a}%;background:var(--teal);"></span>
        <span style="width:${cs.d}%;background:var(--silver);"></span>
        <span style="width:${cs.b}%;background:var(--purple);"></span>
      </div>
      <div class="crowd-labels"><span>${cs.a}%</span><span>${cs.d}%</span><span>${cs.b}%</span></div>
    </div>`;
  }

  return `<div class="match-card" data-match-card data-round="${round}" data-idx="${idx}">
    <div class="match-meta"><span class="badge ${locked?'badge-closed':'badge-open'}">${locked?esc(t('matchLocked')):esc(t('statusOpen'))}</span>${kickoffMeta}</div>
    <div class="match-teams">
      ${teamBlock('a', teams.a)}
      <div class="score-mid">
        <div class="score-pair">
          <input type="number" inputmode="numeric" min="0" max="30" class="score-input" data-action="predScore" data-field="homeGoals" data-round="${round}" data-idx="${idx}" value="${pred.homeGoals!=null?pred.homeGoals:''}" ${locked?'disabled':''}>
          <span class="vs-label">:</span>
          <input type="number" inputmode="numeric" min="0" max="30" class="score-input" data-action="predScore" data-field="awayGoals" data-round="${round}" data-idx="${idx}" value="${pred.awayGoals!=null?pred.awayGoals:''}" ${locked?'disabled':''}>
        </div>
      </div>
      ${teamBlock('b', teams.b)}
    </div>

  </div>`;
}

/* ---------- عرض القوس البصري (Bracket) ---------- */
function renderBracketView(){
  let html = `<div class="bracket-scroll"><div class="bracket">`;
  WC_STAGES.forEach(s=>{
    html += `<div class="bracket-col"><div class="bracket-col-title">${esc(STAGE_NAME_KEY(s))}</div>`;
    for(let i=0;i<s.matchCount;i++){
      const teams = getMatchTeams(s.id,i);
      const res = (state.results.knockout[s.id]||[])[i];
      const winner = resolveMatchWinner(s.id,i);
      const sideHtml = (side, sideTeam)=>{
        const isWinner = winner.code && winner.code===sideTeam.code;
        const goals = res ? (side==='a'?res.homeGoals:res.awayGoals) : null;
        return `<div class="b-team ${sideTeam.code?'':'tbd'}" style="${isWinner?'font-weight:900;':''}">
          <span class="nm">${sideTeam.code?`<span class="${teamFlagClass(sideTeam.code)}"></span>`:''}${esc(sideTeam.code?teamName(sideTeam.code):sideTeam.label)}</span>
          <span class="gl">${goals!=null?goals:''}</span>
        </div>`;
      };
      html += `<div class="b-match" data-action="setRoundAndScroll" data-val="${s.id}">${sideHtml('a',teams.a)}<div class="b-div"></div>${sideHtml('b',teams.b)}</div>`;
    }
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function canSaveRound(round){
  if(!state.user) return false;
  const def = stageDef(round);
  for(let i=0;i<def.matchCount;i++){
    if(isMatchLocked(round,i)) continue; // المباريات المنطلقة فعلاً مستثناة من شرط الإكمال
    const pred = getDraftOrSaved(round,i);
    if(!pred || pred.homeGoals==null || pred.awayGoals==null) return false;
    if(pred.homeGoals===pred.awayGoals && !pred.pen) return false;
  }
  return true;
}

}

/* ---------- بطاقة المشاركة (Share Card) عبر Canvas ---------- */
function openShareCardModal(){
  const rows = leaderboardRows('overall');

  if(!mine) return;
  const total = rows.length;
  const phrase = mine.rank===1 ? t('motivational3') : mine.rank<=3 ? t('motivational3') : (mine.points>0? t('motivational2') : t('motivational1'));

  grad.addColorStop(0,'#1FAFA6'); grad.addColorStop(.45,'#C7CDD3'); grad.addColorStop(.7,'#5C4F95'); grad.addColorStop(1,'#16283A');
  ctx.fillStyle = grad; ctx.fillRect(0,0,900,1125);

  ctx.textAlign='center';

  ctx.fillText('Visit Oman', 450, 175);

  ctx.font='900 130px Tajawal, sans-serif';
  ctx.fillText('#'+mine.rank, 450, 430);

  ctx.font='700 52px Tajawal, sans-serif';
  ctx.fillText(mine.name, 450, 540);

  ctx.font='800 70px Tajawal, sans-serif';
  ctx.fillText(mine.points + ' ' + t('pts'), 450, 650);

  const medal = mine.rank===1?'🥇':mine.rank===2?'🥈':mine.rank===3?'🥉':'⚽';
  ctx.font='120px sans-serif';
  ctx.fillText(medal, 450, 820);

  ctx.font='600 30px Tajawal, sans-serif';
  ctx.fillText(phrase, 450, 920);

  ctx.font='400 20px Tajawal, sans-serif';
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.fillText(state.lang==='en'?('Among '+total+' participants'):('من أصل '+total+' مشاركاً'), 450, 990);

  const dataUrl = canvas.toDataURL('image/png');
  showModal(`
    <h3 class="center" style="margin-bottom:14px;">${esc(t('shareCard'))}</h3>
    <img src="${dataUrl}" style="border-radius:16px;width:100%;margin-bottom:16px;" id="shareCardImg">

      <button class="btn btn-soft btn-sm" data-action="nativeShareCard">${esc(t('shareNow'))}</button>
      <button class="btn btn-ghost btn-sm" data-action="closeModal">✕</button>
    </div>
  `);
  state._shareCanvas = canvas;
}

function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function showToast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.textContent = msg;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(), 2400);
}

/* ---------- Admin: عرض/تعديل توقعات مشارك (كل الأدوار قابلة للتعديل) ---------- */
function adminViewUserModal(userId){
  const p = state.predictions.find(x=>x.id===userId);
  if(!p) return;
  state.adminEditingUserId = userId;
  let html = `<h3 style="margin-bottom:4px;">${esc(p.name)}</h3>
    <p class="muted" style="margin-bottom:14px;">${computeUserTotal(p,'overall')} ${esc(t('pts'))}</p>`;
  WC_STAGES.forEach(s=>{
    html += `<div style="font-weight:800;font-size:12.5px;color:var(--text-dim);margin:14px 0 8px;">${s.icon} ${esc(STAGE_NAME_KEY(s))}</div>`;
    for(let i=0;i<s.matchCount;i++){
      const teams = getMatchTeams(s.id,i);
      const pred = (p.knockout && p.knockout[s.id] && p.knockout[s.id][i]) || {};
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12.5px;">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(teams.a.code?teamName(teams.a.code):teams.a.label)}</span>
        <input type="number" min="0" style="width:40px;padding:5px;text-align:center;border-radius:6px;border:1.3px solid var(--card-border);background:var(--bg);color:var(--text);" data-action="adminEditPredScore" data-uid="${userId}" data-round="${s.id}" data-idx="${i}" data-field="homeGoals" value="${pred.homeGoals!=null?pred.homeGoals:''}">
        <span>:</span>
        <input type="number" min="0" style="width:40px;padding:5px;text-align:center;border-radius:6px;border:1.3px solid var(--card-border);background:var(--bg);color:var(--text);" data-action="adminEditPredScore" data-uid="${userId}" data-round="${s.id}" data-idx="${i}" data-field="awayGoals" value="${pred.awayGoals!=null?pred.awayGoals:''}">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left;">${esc(teams.b.code?teamName(teams.b.code):teams.b.label)}</span>
      </div>`;
    }
  });
  html += `<button class="btn btn-primary btn-block" data-action="adminSaveEditedUser" data-uid="${userId}" style="margin-top:10px;">${esc(t('saveBtn'))}</button>
    <button class="btn btn-ghost btn-block" data-action="closeModal" style="margin-top:8px;">✕</button>`;
  showModal(html);
}

/* ============================================================ */
/* القسم 6: ربط الأحداث (Event Delegation) — معالج واحد مركزي     */
/* ============================================================ */
function setDraftPred(round, idx, patch){
  if(!state.draft[round]) state.draft[round] = {};
  const cur = getDraftOrSaved(round, idx) || {};
  state.draft[round][idx] = Object.assign({}, cur, patch);
}

document.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  switch(action){
    case 'closeModalBg':
      if(e.target===el) closeModal();
      return;
    case 'closeModal': closeModal(); return;

    case 'setPredictView':
      state.predictView = el.dataset.val; saveLS('wc_predictView', state.predictView); render(); return;

    case 'setRound':
      state.activeRound = el.dataset.val; render(); return;

    case 'setRoundAndScroll':
      state.activeRound = el.dataset.val; state.predictView='list'; render();
      window.scrollTo({top:0, behavior:'smooth'}); return;

    case 'setLbTab':
      state.lbSubTab = el.dataset.val; render(); return;

    case 'setAdminRound':
      state.adminRound = el.dataset.val; render(); return;

    case 'continueGuest':
      state.guestConfirmed = true; render(); return;
    case 'backToRegister':
      state.guestConfirmed = false; render(); return;

    case 'registerUser': {
      const input = document.getElementById('nameInput');
      const name = input ? input.value.trim() : '';
      if(!name){ input && input.focus(); return; }
      const existing = state.predictions.find(p=>p.name.trim().toLowerCase()===name.toLowerCase());
      const id = existing ? existing.id : uid();
      state.user = { id, name };
      state.guestConfirmed = false;
      saveLS('wc_user', state.user);
      render();
      return;
    }

    case 'savePredictions': savePredictionsToFirestore(); return;

    case 'setPenWinner': {
      const {round, idx, side} = el.dataset;
      setDraftPred(round, idx, { pen: side==='a' ? {home:1, away:0} : {home:0, away:1} });
      refreshMatchCardPenUI(round, idx);
      updateLiveTotalBar();
      updateSaveButtonState();
      return;
    }

    case 'openShareCard': openShareCardModal(); return;
    case 'copyShareCard':
      if(state._shareCanvas){
        state._shareCanvas.toBlob(blob=>{
          try{ navigator.clipboard.write([new ClipboardItem({'image/png':blob})]); showToast(t('copy')+' ✓'); }
          catch(err){ showToast('—'); }
        });
      }
      return;
    case 'nativeShareCard':
      if(state._shareCanvas && navigator.share){
        state._shareCanvas.toBlob(blob=>{
          const file = new File([blob], 'wc-card.png', {type:'image/png'});
          navigator.share({files:[file], title:'World Cup Prediction'}).catch(()=>{});
        });
      }
      return;

    case 'adminLogin': {
      const pass = document.getElementById('adminPassInput').value;
      if(pass === ADMIN_PASSWORD){
        state.adminAuthed = true; saveLS('wc_admin_ok', true); render();
      } else {
        document.getElementById('adminLoginError').textContent = t('wrongPassword');
      }
      return;
    }
    case 'adminLogout': state.adminAuthed = false; saveLS('wc_admin_ok', false); render(); return;

    case 'setRoundOverride': {
      const {round, val} = el.dataset;
      if(!state.results.overrides) state.results.overrides = {};
      state.results.overrides[round] = val;
      logAdminUpdate((state.lang==='en'?'Round override: ':'تجاوز حالة الدور: ')+round+' → '+val);
      saveResultsToFirestore(); return;
    }

    case 'adminSetPen': {
      const {round, idx, side} = el.dataset;
      ensureResultSlot(round, idx);
      state.results.knockout[round][idx].pen = side==='a' ? {home:1,away:0} : {home:0,away:1};
      logAdminUpdate((state.lang==='en'?'Penalty winner set: ':'حدد فائز الترجيح: ')+round+' #'+(+idx+1));
      saveResultsToFirestore(); return;
    }

    case 'adminViewUser': adminViewUserModal(el.dataset.id); return;
    case 'adminSaveEditedUser': adminPersistEditedUser(el.dataset.uid); return;
    case 'adminDeleteUser': {
      if(confirm(t('confirmDelete'))){
        deleteParticipant(el.dataset.id);
      }
      return;
    }
  }
});

function ensureResultSlot(round, idx){
  if(!state.results.knockout[round][idx]) state.results.knockout[round][idx] = {homeGoals:null, awayGoals:null, pen:null, kickoff:null};
}

function refreshMatchCardPenUI(round, idx){
  const card = document.querySelector(`[data-match-card][data-round="${round}"][data-idx="${idx}"]`);
  if(!card) return;
  card.querySelectorAll('[data-action="setPenWinner"]').forEach(btn=>{
    const pred = getDraftOrSaved(round, idx) || {};
    const isSel = pred.pen && ((btn.dataset.side==='a' && pred.pen.home>pred.pen.away) || (btn.dataset.side==='b' && pred.pen.away>pred.pen.home));
    btn.classList.toggle('sel', !!isSel);
  });
}

/* أحداث الإدخال (input/change) — Score boxes, checkboxes, date pickers */
document.addEventListener('input', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action==='predScore'){
    const {round, idx, field} = el.dataset;
    const v = el.value===''? null : Math.max(0, parseInt(el.value,10));
    setDraftPred(round, idx, { [field]: v });
    togglePenRowVisibility(round, idx);
    updateLiveTotalBar();
    updateSaveButtonState();
    return;
  }
  if(action==='groupStat'){
    const {group, team, field} = el.dataset;
    const v = el.value===''? '' : parseInt(el.value,10);
    if(!state.results.groups[group]) state.results.groups[group] = {completed:false, teams:{}};
    if(!state.results.groups[group].teams[team]) state.results.groups[group].teams[team] = {w:0,d:0,l:0,gd:0};
    state.results.groups[group].teams[team][field] = v===''?'':v;
    debounceSaveResults();
    return;
  }
  if(action==='adminScore'){
    const {round, idx, field} = el.dataset;
    ensureResultSlot(round, idx);
    const v = el.value===''? null : Math.max(0,parseInt(el.value,10));
    state.results.knockout[round][idx][field] = v;
    refreshAdminPenRowVisibility(round, idx);
    debounceSaveResults();
    return;
  }
  if(action==='adminEditPredScore'){
    const {uid, round, idx, field} = el.dataset;
    const v = el.value===''? null : Math.max(0,parseInt(el.value,10));
    if(!state.adminEditBuffer) state.adminEditBuffer = {};
    if(!state.adminEditBuffer[uid]) state.adminEditBuffer[uid] = JSON.parse(JSON.stringify(state.predictions.find(p=>p.id===uid)||{knockout:{}}));
    if(!state.adminEditBuffer[uid].knockout[round]) state.adminEditBuffer[uid].knockout[round]=[];
    if(!state.adminEditBuffer[uid].knockout[round][idx]) state.adminEditBuffer[uid].knockout[round][idx]={};
    state.adminEditBuffer[uid].knockout[round][idx][field]=v;
    return;
  }
});

document.addEventListener('change', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  if(el.dataset.action==='toggleGroupComplete'){
    const g = el.dataset.group;
    if(!state.results.groups[g]) state.results.groups[g] = {completed:false, teams:{}};
    state.results.groups[g].completed = el.checked;
    logAdminUpdate((state.lang==='en'?'Group results confirmed: ':'تأكيد نتائج المجموعة ')+g);
    saveResultsToFirestore();
    render();
    return;
  }
  if(el.dataset.action==='adminKickoff'){
    const {round, idx} = el.dataset;
    ensureResultSlot(round, idx);
    state.results.knockout[round][idx].kickoff = el.value ? new Date(el.value).toISOString() : null;
    logAdminUpdate((state.lang==='en'?'Kickoff time set: ':'تحديد موعد الانطلاق: ')+round+' #'+(+idx+1));
    saveResultsToFirestore();
    return;
  }
});

function togglePenRowVisibility(round, idx){
  const card = document.querySelector(`[data-match-card][data-round="${round}"][data-idx="${idx}"]`);
  if(!card) return;
  const pred = getDraftOrSaved(round, idx) || {};
  const isTie = pred.homeGoals!=null && pred.awayGoals!=null && pred.homeGoals===pred.awayGoals;
  const row = card.querySelector('[data-pen-row]');
  if(row) row.style.display = isTie ? '' : 'none';
}
function refreshAdminPenRowVisibility(round, idx){
  const card = document.querySelector(`[data-admin-match-card][data-round="${round}"][data-idx="${idx}"]`);
  if(!card) return;
  const res = (state.results.knockout[round]||[])[idx] || {};
  const isTie = res.homeGoals!=null && res.awayGoals!=null && res.homeGoals===res.awayGoals;
  const row = card.querySelector('[data-admin-pen-row]');
  if(row) row.style.display = isTie ? '' : 'none';
}

let resultsSaveDebounce = null;
function debounceSaveResults(){
  clearTimeout(resultsSaveDebounce);
  resultsSaveDebounce = setTimeout(()=>{ saveResultsToFirestore(); }, 600);
}

function updateSaveButtonState(){
  const btn = document.getElementById('saveBtn');
  if(!btn) return;
  btn.disabled = !canSaveRound(state.activeRound);
}
function logAdminUpdate(text){
  state.results.lastUpdate = { text, ts: Date.now() };
}

function deleteParticipant(userId){
  state.predictions = state.predictions.filter(p=>p.id!==userId);
  saveAllPredictionsToFirestore();
  if(state.user && state.user.id===userId){
    state.user = null; state.guestConfirmed = false; localStorage.removeItem('wc_user');
  }
  render();
}

function adminPersistEditedUser(userId){
  const edited = state.adminEditBuffer && state.adminEditBuffer[userId];
  if(!edited) { closeModal(); return; }
  const i = state.predictions.findIndex(p=>p.id===userId);
  if(i>=0) state.predictions[i] = edited; else state.predictions.push(edited);
  logAdminUpdate((state.lang==='en'?'Edited predictions for ':'تعديل توقعات ')+edited.name);
  saveAllPredictionsToFirestore();
  closeModal();
  showToast(t('savedToast'));
}

/* ============================================================ */
/* القسم 7: Firebase Firestore — التخزين والمزامنة الحيّة          */
/* ============================================================ */
let fsDb = null, predictionsRef = null, resultsRef = null;
const FIRESTORE_CONFIGURED = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf('REPLACE')===-1);

(function initFirebase(){
  if(!FIRESTORE_CONFIGURED){
    console.warn('[WC Challenge] Firebase placeholders not replaced — running in local-only demo mode. Replace FIREBASE_CONFIG to enable live sync.');
    return;
  }
  try{
    const app = initializeApp(FIREBASE_CONFIG);
    fsDb = getFirestore(app);
    predictionsRef = doc(fsDb, 'calendar', 'wc_predictions');
    resultsRef = doc(fsDb, 'calendar', 'wc_results');
  }catch(e){
    console.warn('[WC Challenge] Firebase init failed, falling back to local-only mode.', e);
    fsDb = null;
  }
})();

function isFormFocused(){
  const ae = document.activeElement;
  return ae && ae.closest && (ae.closest('#mainRoot [data-match-card]') || ae.closest('.admin-lock') || ae.id==='nameInput');
}

function subscribeLive(){
  if(fsDb){
    onSnapshot(predictionsRef, snap=>{
      const data = snap.exists() ? snap.data() : null;
      state.predictions = (data && data.value) || [];
      onPredictionsUpdated();
    }, err=>console.warn('predictions onSnapshot error', err));
    onSnapshot(resultsRef, snap=>{
      const data = snap.exists() ? snap.data() : null;
      state.results = (data && data.value) ? normalizeResults(data.value) : emptyResults();
      onResultsUpdated();
    }, err=>console.warn('results onSnapshot error', err));
  } else {
    state.predictions = loadLS('wc_predictions_local', []);
    state.results = normalizeResults(loadLS('wc_results_local', null) || emptyResults());
    render();
  }
}
function normalizeResults(r){
  const base = emptyResults();
  return Object.assign(base, r, {
    groups: r.groups || {},
    overrides: r.overrides || {},
    knockout: Object.assign(base.knockout, r.knockout||{}),
  });
}

function onPredictionsUpdated(){
  if(state.activeTab==='predict' && isFormFocused()){
    return; // لا تُعِد رسم الشاشة بالكامل أثناء كتابة المستخدم — حفاظاً على تركيز الإدخال
  }
  render();
}
function onResultsUpdated(){
  if(state.activeTab==='predict' && isFormFocused()){
    updateLiveTotalBar();
    return;
  }
  render();
}

function persistPredictions(){
  if(fsDb){ setDoc(predictionsRef, { value: state.predictions }); }
  else { saveLS('wc_predictions_local', state.predictions); }
}
function persistResults(){
  if(fsDb){ setDoc(resultsRef, { value: state.results }); }
  else { saveLS('wc_results_local', state.results); }
}
function saveAllPredictionsToFirestore(){ persistPredictions(); }
function saveResultsToFirestore(){ persistResults(); }

function savePredictionsToFirestore(){
  if(!state.user) return;
  const round = state.activeRound;
  if(!canSaveRound(round)) return;
  const merged = currentMergedPrediction();
  merged.ts = Date.now();
  const i = state.predictions.findIndex(p=>p.id===state.user.id);
  if(i>=0) state.predictions[i] = merged; else state.predictions.push(merged);
  state.draft[round] = {};
  persistPredictions();
  showToast(t('savedToast'));
  render();
}

/* ============================================================ */
/* القسم 8: العداد التنازلي + أزرار الرأس + الإقلاع (Init)         */
/* ============================================================ */
function startCountdown(){
  if(state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownTimer = setInterval(()=>{
    if(document.hidden) return; // يتوقف تلقائياً عند مغادرة التبويب
    const prevNext = nextClosingMatch();
    state.now = new Date();
    updateCountdownDOM();
    const newNext = nextClosingMatch();
    // إن انطلقت المباراة التي كنا نعدّ لها، أعد رسم الواجهة لتحديث الحالة (مغلق/مفتوح)
    if(prevNext && (!newNext || newNext.round!==prevNext.round || newNext.slotIndex!==prevNext.slotIndex)){
      if(!isFormFocused()) render();
    }
  }, 60000); // يتحدث كل دقيقة حسب المواصفة
}
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){ state.now = new Date(); updateCountdownDOM(); }
});

document.getElementById('themeToggle').addEventListener('click', ()=>{
  state.theme = state.theme==='dark' ? 'light' : 'dark';
  saveLS('wc_theme', state.theme);
  applyTheme();
});
document.getElementById('langToggle').addEventListener('click', ()=>{
  state.lang = state.lang==='ar' ? 'en' : 'ar';
  saveLS('wc_lang', state.lang);
  render();
});
document.getElementById('tabbar').addEventListener('click', (e)=>{
  const btn = e.target.closest('.tab-btn');
  if(!btn) return;
  state.activeTab = btn.dataset.tab;
  render();
});

function init(){
  applyTheme(); applyDir();
  if(!state.activeRound) state.activeRound = 'r32';
  subscribeLive();
  startCountdown();
  render();
}
init();
</script>
